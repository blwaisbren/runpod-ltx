name: build-push

# Builds the ComfyUI + LTX-2.3 image and pushes it to GitHub Container Registry (GHCR).
# GHCR needs NO extra secrets — it authenticates with the built-in GITHUB_TOKEN.
# To use Docker Hub instead, see the commented block at the bottom.

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]          # e.g. push tag v1.0.0 to cut a release image
  workflow_dispatch:         # manual "Run workflow" button

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # owner/repo — metadata-action lowercases it

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write        # required to push to GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The image is several GB; reclaim runner disk before building.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune -af || true
          df -h

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Image pushed :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Make the GHCR package **public** (repo > Packages > package > Settings)" >> "$GITHUB_STEP_SUMMARY"
          echo "so RunPod can pull it without registry credentials." >> "$GITHUB_STEP_SUMMARY"

# ─────────────────────────────────────────────────────────────────────────────
# DOCKER HUB ALTERNATIVE
# Prefer Docker Hub? Add repo secrets DOCKERHUB_USERNAME and DOCKERHUB_TOKEN
# (Account Settings > Security > New Access Token), then replace the login + meta
# images value with:
#
#   - name: Log in to Docker Hub
#     uses: docker/login-action@v3
#     with:
#       username: ${{ secrets.DOCKERHUB_USERNAME }}
#       password: ${{ secrets.DOCKERHUB_TOKEN }}
#
#   # in metadata-action:  images: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/comfyui-ltx
#
# Docker Hub repos are public by default, so RunPod can pull immediately.
# ─────────────────────────────────────────────────────────────────────────────
